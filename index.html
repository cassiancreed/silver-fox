<!DOCTYPE html>
<html lang="en">
<head>

<title>Daily Ops — Operation Silver Fox</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e14;
  --bg2: #111720;
  --surface: #1a222e;
  --surface2: #222b38;
  --border: #2d3747;
  --border-light: #3a4556;
  --text: #e8ecf2;
  --text-dim: #9aa3b2;
  --text-muted: #6a7383;
  --gold: #d4a574;
  --gold-bright: #e8c294;
  --silver: #c9d1dc;
  --red: #e06c75;
  --green: #7fbf6a;
  --blue: #5fa8d3;
  --purple: #b78be0;
  --coral: #e89b7a;
  --checked: #2d3747;
  --accent: var(--gold);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Fraunces', Georgia, serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at top, rgba(212, 165, 116, 0.04), transparent 50%),
    radial-gradient(ellipse at bottom, rgba(91, 155, 245, 0.03), transparent 50%);
  color: var(--text);
  line-height: 1.6;
  padding: 20px;
  min-height: 100vh;
}

.container { max-width: 840px; margin: 0 auto; }

.header {
  text-align: center;
  padding: 24px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.header h1 {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 32px;
  letter-spacing: -0.8px;
  margin: 16px 0 6px;
  font-style: italic;
}

.header h1 span { color: var(--gold); font-style: italic; }

.header .subtitle {
  color: var(--text-dim);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header .date {
  color: var(--gold);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  margin-top: 8px;
  font-weight: 500;
}

.day-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 14px;
  border-radius: 4px;
  margin-top: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}

.day-monday { background: rgba(127, 191, 106, 0.15); color: var(--green); border: 1px solid rgba(127, 191, 106, 0.3); }
.day-tuesday { background: rgba(224, 108, 117, 0.15); color: var(--red); border: 1px solid rgba(224, 108, 117, 0.3); }
.day-wednesday { background: rgba(212, 165, 116, 0.15); color: var(--gold); border: 1px solid rgba(212, 165, 116, 0.3); }
.day-thursday { background: rgba(95, 168, 211, 0.15); color: var(--blue); border: 1px solid rgba(95, 168, 211, 0.3); }
.day-friday { background: rgba(183, 139, 224, 0.15); color: var(--purple); border: 1px solid rgba(183, 139, 224, 0.3); }
.day-saturday { background: rgba(232, 194, 148, 0.15); color: var(--gold-bright); border: 1px solid rgba(232, 194, 148, 0.3); }
.day-sunday { background: rgba(201, 209, 220, 0.15); color: var(--silver); border: 1px solid rgba(201, 209, 220, 0.3); }

.progress {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 16px;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.progress-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg2);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright));
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}

.pain-selector {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.pain-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.pain-btn {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.pain-btn:hover { border-color: var(--border-light); color: var(--text); }
.pain-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

.pain-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  font-weight: 500;
  margin-left: auto;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.ctrl-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 14px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.ctrl-btn:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--border-light);
}

.ctrl-btn.primary {
  background: rgba(212, 165, 116, 0.1);
  border-color: var(--gold);
  color: var(--gold);
}

.ctrl-btn.primary:hover { background: rgba(212, 165, 116, 0.2); }

.block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 14px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.block:hover { border-color: var(--border-light); }

.block.all-done { opacity: 0.55; }

.block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}

.block-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.block-name {

  font-size: 16px;

  font-style: italic;
  margin-left: 14px;

.block-count {

  font-size: 11px;

.block-items { padding: 6px 0; }

.item {
  display: flex;
  align-items: center;
  padding: 10px 18px;
  border-bottom: 1px solid rgba(45, 55, 71, 0.5);
  transition: background 0.15s;
  cursor: pointer;
  user-select: none;
}

.item:last-child { border-bottom: none; }
.item:hover { background: var(--surface2); }
.item.checked { opacity: 0.45; }
.item.checked .item-name,
.item.checked .item-container { text-decoration: line-through; }

.item.skipped { opacity: 0.4; background: rgba(224, 108, 117, 0.05); }
.item.skipped .item-name { color: var(--red); text-decoration: line-through; }

.item.conditional { background: rgba(232, 155, 122, 0.04); }

.checkbox {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-light);
  border-radius: 4px;
  margin-right: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.item.checked .checkbox {
  background: var(--gold);
  border-color: var(--gold);
}

.item.checked .checkbox::after {
  content: '✓';
  color: var(--bg);
  font-weight: 700;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
}

.item.skipped .checkbox {
  background: var(--red);
  border-color: var(--red);
}

.item.skipped .checkbox::after {
  content: '×';
  color: var(--bg);
  font-weight: 700;
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
}

.item-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.item-name {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;

.item-container {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.3px;
  text-transform: uppercase;

.item-note {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 11px;

  margin-top: 2px;

.item-skip-badge, .item-prn-badge, .item-new-badge {

  font-family: 'JetBrains Mono', monospace;

  margin-left: 8px;

.item-skip-badge {

  border: 1px solid rgba(224, 108, 117, 0.3);

.item-prn-badge {

.item-new-badge {

.block.cat-wake { border-left: 3px solid var(--blue); }
.block.cat-grooming { border-left: 3px solid var(--silver); }
.block.cat-breakfast { border-left: 3px solid var(--gold); }

.block.cat-workout { border-left: 3px solid var(--green); }
.block.cat-afternoon { border-left: 3px solid var(--purple); }
.block.cat-dinner { border-left: 3px solid var(--purple); }

.block.cat-sleep { border-left: 3px solid var(--accent); }
.block.cat-bed { border-left: 3px solid var(--red); }

.footer {
  text-align: center;
  padding: 30px 0 20px;
  color: var(--text-muted);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}

.footer .tagline {
  color: var(--gold);
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  margin-bottom: 4px;
}

@media (max-width: 640px) {
  body { padding: 14px; }
  .header h1 { font-size: 26px; }
  .block-header { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
  .block-time { font-size: 14px; }
  .block-name { margin-left: 0; font-size: 14px; }
  .item { padding: 10px 14px; }
  .item-name { font-size: 14px; }
  .pain-selector { gap: 6px; padding: 12px 14px; }
  .pain-btn { width: 28px; height: 28px; font-size: 12px; }
  .pain-status { width: 100%; margin-left: 0; margin-top: 4px; }
}
</style>
</head>

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function getDayInfo() {
  const now = new Date();
  const dayIdx = now.getDay();
  const dayName = DAY_NAMES[dayIdx];
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  return { dayIdx, dayName, dateStr };
}

function isTuesday() { return new Date().getDay() === 2; }

function render() {
  const { dayName, dateStr } = getDayInfo();
  document.getElementById('currentDate').textContent = dateStr;

  const tag = document.getElementById('dayTag');
  const isTue = isTuesday();
  tag.className = 'day-tag day-' + dayName.toLowerCase();
  tag.textContent = isTue ? '★ Tuesday — Resort Night (THC skip)' : dayName;

  const blocksEl = document.getElementById('blocks');
  blocksEl.innerHTML = '';

  let totalItems = 0;
  let checkedItems = 0;

  BLOCKS.forEach(block => {
    const blockDiv = document.createElement('div');
    blockDiv.className = 'block ' + block.category;

    const visibleItems = block.items.filter(item => !(item.skipTuesday && isTue));
    const nonConditionalItems = visibleItems.filter(item => !item.conditional);
    const allChecked = nonConditionalItems.length > 0 && nonConditionalItems.every(item => state.checked[item.id]);
    if (allChecked) blockDiv.classList.add('all-done');

    const blockDoneCount = visibleItems.filter(item => state.checked[item.id]).length;

    const countedItems = nonConditionalItems;
    totalItems += countedItems.length;
    checkedItems += countedItems.filter(item => state.checked[item.id]).length;

    blockDiv.innerHTML = `
      <div class="block-header">
        <span class="block-time">${block.time}</span>
        <span class="block-name">${block.name}</span>
        <span class="block-count">${blockDoneCount} / ${visibleItems.length}</span>
      </div>
      <div class="block-items"></div>
    `;

    blocksEl.appendChild(blockDiv);

    const itemsEl = blockDiv.querySelector('.block-items');

    block.items.forEach(item => {
      const itemDiv = document.createElement('div');
      const isSkippedToday = item.skipTuesday && isTue;
      const isChecked = state.checked[item.id];
      const isConditional = item.conditional;

      let classes = 'item';
      if (isChecked) classes += ' checked';
      if (isSkippedToday) classes += ' skipped';
      if (isConditional) classes += ' conditional';

      itemDiv.className = classes;
      itemDiv.onclick = () => isSkippedToday ? null : toggle(item.id);

      let noteHtml = item.note ? `<div class="item-note">${item.note}</div>` : '';
      let badge = '';
      if (isSkippedToday) badge = '<span class="item-skip-badge">Skip Tuesday</span>';
      else if (isConditional) badge = '<span class="item-prn-badge">PRN</span>';
      else if (item.isNew) badge = '<span class="item-new-badge">New</span>';

      itemDiv.innerHTML = `
        <div class="checkbox"></div>
        <div class="item-info">
          <div class="item-name">${item.name}${badge}</div>
          <div class="item-container">${item.container}</div>
          ${noteHtml}
        </div>
      `;

      itemsEl.appendChild(itemDiv);
    });
  });

  document.getElementById('progressCount').textContent = `${checkedItems} / ${totalItems}`;
  const pct = totalItems > 0 ? (checkedItems / totalItems) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  document.querySelectorAll('.pain-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.pain) === state.pain);
  });

  const painStatus = document.getElementById('painStatus');
  if (state.pain !== null) {
    painStatus.textContent = `Pain ${state.pain}/10 recorded`;
  } else {
    painStatus.textContent = 'Not set';
  }
}

function toggle(id) {
  state.checked[id] = !state.checked[id];
  saveState();
  render();
}

function resetDay() {
  if (!confirm('Reset all checkboxes for today?')) return;
  state.checked = {};
  saveState();
  render();
}

function checkAll() {
  BLOCKS.forEach(block => {
    block.items.forEach(item => {
      if (!(item.skipTuesday && isTuesday()) && !item.conditional) {
        state.checked[item.id] = true;
      }
    });
  });
  saveState();
  render();
}

function uncheckAll() {
  state.checked = {};
  saveState();
  render();
}

document.querySelectorAll('.pain-btn').forEach(btn => {
  btn.onclick = () => {
    const val = parseInt(btn.dataset.pain);
    state.pain = state.pain === val ? null : val;
    saveState();
    render();
  };
});

function checkMidnightReset() {
  const today = new Date().toISOString().split('T')[0];
  const storedKey = 'silverfox_' + today;
  if (storedKey !== TODAY_KEY) {
    location.reload();
  }
}
setInterval(checkMidnightReset, 60000);

render();
</script>
</body>
</html>
