<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14141b"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4D47F"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9A7D21"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Gold top rule (matches app header) -->
  <rect x="64" y="64" width="384" height="3" fill="url(#gold)" opacity="0.6"/>

  <!-- Plate (oval ring) -->
  <ellipse cx="256" cy="360" rx="170" ry="42" fill="none" stroke="url(#gold)" stroke-width="9" opacity="0.9"/>
  <ellipse cx="256" cy="360" rx="135" ry="30" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.4"/>

  <!-- Fork (centered, standing up from plate) -->
  <g transform="translate(256, 130)">
    <!-- 4 Tines -->
    <rect x="-52" y="0" width="14" height="80" rx="5" fill="url(#gold)"/>
    <rect x="-24" y="0" width="14" height="80" rx="5" fill="url(#gold)"/>
    <rect x="10" y="0" width="14" height="80" rx="5" fill="url(#gold)"/>
    <rect x="38" y="0" width="14" height="80" rx="5" fill="url(#gold)"/>
    <!-- Tine base -->
    <rect x="-56" y="68" width="112" height="28" rx="10" fill="url(#gold)"/>
    <!-- Handle -->
    <rect x="-16" y="92" width="32" height="140" rx="8" fill="url(#gold)"/>
  </g>

  <!-- FOOD label -->
  <text x="256" y="460"
        font-family="'JetBrains Mono', monospace"
        font-size="38"
        font-weight="800"
        letter-spacing="12"
        text-anchor="middle"
        fill="#D4AF37"
        opacity="0.9">FOOD</text>
</svg>
